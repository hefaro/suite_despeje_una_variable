<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Certificado - Notación Científica</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg: #0b0e14;
        }

        body {
            margin: 0;
            background: #090a0f;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* CONTENEDOR PRINCIPAL (Capa negra) */
        #certificate-container {
            display: flex; /* Cambiado de 'none' a 'flex' para ver la prueba */
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            flex-direction: column;
            align-items: center;    /* CENTRA TODO HORIZONTALMENTE */
            justify-content: center; /* CENTRA TODO VERTICALMENTE */
            padding: 20px;
        }

        /* EL CERTIFICADO (La hoja blanca) */
        #certificate {
            width: 600px;
            height: 400px;
            background: white;
            color: #1a1a1a;
            padding: 30px;
            border: 10px double var(--primary);
            text-align: center;
            box-shadow: 0 0 50px rgba(79, 172, 254, 0.5);
            box-sizing: border-box;
            position: relative;
        }

        .cert-content h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            color: #0b0e14;
            margin-bottom: 5px;
        }

        .cert-content h2 {
            color: var(--primary);
            border-bottom: 2px solid #ddd;
            display: inline-block;
            padding: 0 30px;
            margin: 10px 0;
        }

        .cert-footer {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            font-weight: bold;
            font-size: 18px;
        }

        .cert-logo {
            font-size: 50px;
            margin-top: 20px;
            opacity: 0.1;
        }

        /* EL BOTÓN (Corregido para PC) */
        #btn-download-cert {
            margin-top: 30px;        /* Espacio respecto al certificado */
            padding: 12px 40px;
            width: auto;             /* No ocupa todo el ancho */
            min-width: 250px;        /* Tamaño mínimo elegante */
            background: #1a1a1a;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        #btn-download-cert:hover {
            background: var(--secondary);
            color: #0b0e14;
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.6);
        }
    </style>
</head>
<body>

    <div id="certificate-container">
        <div id="certificate">
            <div class="cert-content">
                <h1>CERTIFICADO DE LOGRO</h1>
                <p style="margin: 0; color: #666;">Se otorga con honor a:</p>
                <h2 id="cert-name">Héctor Fabio Rojas</h2>
                <p>Por completar con éxito el desafío de:</p>
                <h3 style="font-family: 'Orbitron';">NOTACIÓN CIENTÍFICA</h3>
                
                <div class="cert-footer">
                    <div>NOTA: <span id="cert-grade" style="color: var(--primary);">5.0</span></div>
                    <div>FECHA: <span id="cert-date">26/03/2026</span></div>
                </div>
                
                <div class="cert-logo">🚀</div>
            </div>
        </div>

        <button id="btn-download-cert">¡Descargar mi Título!</button>
    </div>

    <script>
        // Simulación del funcionamiento del botón
        document.getElementById('btn-download-cert').onclick = function() {
            const certElement = document.getElementById('certificate');
            const btn = this;
            btn.innerText = "Generando...";

            html2canvas(certElement, {
                scale: 2, // Alta calidad
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Certificado_Prueba.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
                btn.innerText = "¡Descargado!";
                setTimeout(() => btn.innerText = "¡Descargar mi Título!", 2000);
            });
        };
    </script>
</body>
</html>
